<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#00ff66" />
  <meta name="description" content="NEXCHAT - Watch Reels (TikTok Style)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="format-detection" content="telephone=no" />
  <title>📹 NEXCHAT Reels Watch</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="logo.jpg" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Orbitron', -apple-system, sans-serif;
      background: #000;
      color: #fff;
    }

    .reels-viewer {
      width: 100%;
      height: 100%;
      display: flex;
      position: relative;
      background: #000;
    }

    .reel-slide {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      opacity: 0;
      transition: opacity 0.3s ease;
      will-change: opacity;
    }

    .reel-slide.active {
      opacity: 1;
      z-index: 10;
    }

    .reel-slide video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    /* Reel Info Overlay */
    .reel-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 60px 16px 16px;
      background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.9) 100%);
      z-index: 20;
      pointer-events: none;
    }

    .reel-user {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      pointer-events: auto;
    }

    .reel-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(0, 255, 102, 0.2);
      border: 2px solid #00ff66;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .reel-user-info h3 {
      font-size: 14px;
      font-weight: 700;
      color: #00ff66;
    }

    .reel-user-info p {
      font-size: 12px;
      color: #aaa;
    }

    .reel-caption {
      font-size: 13px;
      line-height: 1.5;
      color: #fff;
      margin-bottom: 12px;
      word-wrap: break-word;
      pointer-events: auto;
    }

    /* Right Side Controls */
    .reel-controls {
      position: absolute;
      right: 12px;
      bottom: 120px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      z-index: 30;
    }

    .control-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.6);
      border: none;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .control-btn:active {
      transform: scale(0.9);
      background: rgba(0, 255, 102, 0.3);
    }

    .control-btn.liked {
      color: #ff3366;
    }

    .control-label {
      font-size: 11px;
      margin-top: 6px;
      text-align: center;
      color: #aaa;
    }

    .control-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Top Controls */
    .reel-top-controls {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      gap: 8px;
      z-index: 30;
    }

    .close-btn, .menu-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.6);
      border: none;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .close-btn:active, .menu-btn:active {
      transform: scale(0.9);
      background: rgba(0, 255, 102, 0.3);
    }

    /* Progress Indicator */
    .progress-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(255, 255, 255, 0.1);
      z-index: 40;
    }

    .progress-fill {
      height: 100%;
      background: #00ff66;
      width: 0%;
      transition: width 0.1s linear;
    }

    /* Loading Indicator */
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #00ff66;
      font-size: 14px;
      z-index: 5;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(0, 255, 102, 0.2);
      border-top-color: #00ff66;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Gesture Hints */
    .gesture-hint {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      text-align: center;
      opacity: 0;
      animation: fadeInOut 2s ease-in-out;
    }

    @keyframes fadeInOut {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }

    /* Mobile Responsive */
    @media (max-width: 600px) {
      .reel-controls {
        right: 8px;
        bottom: 100px;
        gap: 12px;
      }

      .control-btn {
        width: 44px;
        height: 44px;
        font-size: 20px;
      }

      .reel-info {
        padding: 50px 12px 12px;
      }

      .reel-caption {
        font-size: 12px;
      }

      .reel-user-info h3 {
        font-size: 13px;
      }
    }

    @media (orientation: landscape) and (max-height: 600px) {
      .reel-info {
        padding: 40px 12px 8px;
      }

      .reel-user {
        margin-bottom: 6px;
      }

      .reel-controls {
        bottom: 60px;
        gap: 10px;
      }

      .control-btn {
        width: 40px;
        height: 40px;
        font-size: 18px;
      }
    }

    /* Double tap animation */
    .double-tap-indicator {
      position: absolute;
      width: 60px;
      height: 60px;
      border: 3px solid #00ff66;
      border-radius: 50%;
      pointer-events: none;
      animation: tapPulse 0.4s ease-out;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    @keyframes tapPulse {
      0% {
        transform: scale(0.1);
        opacity: 1;
      }
      100% {
        transform: scale(1.5);
        opacity: 0;
      }
    }

    .swipe-indicator {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.4);
      font-size: 12px;
      animation: slideUp 0.6s ease-in-out;
    }

    @keyframes slideUp {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
      50% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translateX(-50%) translateY(-20px);
      }
    }
  </style>
</head>
<body>

<div class="reels-viewer" id="reelsViewer">
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="reel-top-controls">
    <a href="reels.html" class="close-btn" title="Back to Reels">✕</a>
  </div>

  <div id="reelsContainer"></div>

  <div class="gesture-hint" id="gestureHint">👆 Swipe up for next • Double tap to like</div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
  import { getFirestore, collection, getDocs, query, where, orderBy } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';
  import { getAuth } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';

  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyBxY-2LkJtVrVx-l-Yt5n-Jd6qTfXxZqwE",
    authDomain: "nexchat-a94b7.firebaseapp.com",
    projectId: "nexchat-a94b7",
    storageBucket: "nexchat-a94b7.appspot.com",
    messagingSenderId: "767844476127",
    appId: "1:767844476127:web:45c5d8f5e7e9a1b2c3d4e5f6"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // State
  let reels = [];
  let currentIndex = 0;
  let touchStartY = 0;
  let likedReels = new Set();

  // Load reels from Firebase
  async function loadReels() {
    try {
      const q = query(
        collection(db, 'reels'),
        where('public', '==', true),
        orderBy('createdAt', 'desc')
      );
      const snap = await getDocs(q);
      reels = snap.docs.map((doc, idx) => ({
        id: doc.id,
        ...doc.data(),
        index: idx
      }));

      if (reels.length === 0) {
        reels = generateDemoReels();
      }

      renderReels();
      showReel(0);
    } catch (err) {
      console.error('Error loading reels:', err);
      reels = generateDemoReels();
      renderReels();
      showReel(0);
    }
  }

  function generateDemoReels() {
    return [
      {
        id: '1',
        username: 'nexchat_user',
        caption: '🎉 Welcome to NEXCHAT Reels! Your TikTok-style messaging experience starts here.',
        videoUrl: 'https://via.placeholder.com/360x640?text=Reel+1',
        likes: 0,
        index: 0
      },
      {
        id: '2',
        username: 'tech_creator',
        caption: '💻 Building amazing things with NEXCHAT',
        videoUrl: 'https://via.placeholder.com/360x640?text=Reel+2',
        likes: 0,
        index: 1
      },
      {
        id: '3',
        username: 'social_star',
        caption: '✨ Share your moments with the world',
        videoUrl: 'https://via.placeholder.com/360x640?text=Reel+3',
        likes: 0,
        index: 2
      }
    ];
  }

  function renderReels() {
    const container = document.getElementById('reelsContainer');
    container.innerHTML = '';

    reels.forEach((reel, idx) => {
      const slide = document.createElement('div');
      slide.className = `reel-slide ${idx === 0 ? 'active' : ''}`;
      slide.id = `reel-${idx}`;

      slide.innerHTML = `
        <video 
          id="video-${idx}"
          src="${reel.videoUrl}" 
          loop 
          muted
          playsinline
          preload="metadata"
          style="object-fit: contain; background: #000;">
        </video>

        <div class="reel-info">
          <div class="reel-user">
            <div class="reel-avatar">👤</div>
            <div class="reel-user-info">
              <h3>@${escapeHtml(reel.username)}</h3>
              <p>${new Date(reel.createdAt?.toDate?.() || Date.now()).toLocaleDateString()}</p>
            </div>
          </div>
          <div class="reel-caption">${escapeHtml(reel.caption || '')}</div>
        </div>

        <div class="reel-controls">
          <div class="control-item">
            <button class="control-btn like-btn" data-reel-id="${reel.id}" data-index="${idx}">❤️</button>
            <div class="control-label">${reel.likes || 0}</div>
          </div>
          <div class="control-item">
            <button class="control-btn comment-btn">💬</button>
            <div class="control-label">Comment</div>
          </div>
          <div class="control-item">
            <button class="control-btn share-btn">↗️</button>
            <div class="control-label">Share</div>
          </div>
          <div class="control-item">
            <button class="control-btn bookmark-btn">🔖</button>
            <div class="control-label">Save</div>
          </div>
        </div>
      `;

      // Like button handler
      const likeBtn = slide.querySelector('.like-btn');
      likeBtn.addEventListener('click', () => toggleLike(likeBtn, reel.id));

      // Other button handlers
      slide.querySelector('.comment-btn').addEventListener('click', () => {
        alert('💬 Comment feature coming soon!');
      });

      slide.querySelector('.share-btn').addEventListener('click', () => {
        alert('↗️ Share feature coming soon!');
      });

      slide.querySelector('.bookmark-btn').addEventListener('click', () => {
        const btn = slide.querySelector('.bookmark-btn');
        btn.style.color = btn.style.color === 'rgb(0, 255, 102)' ? '#fff' : '#00ff66';
      });

      container.appendChild(slide);
    });
  }

  function showReel(index) {
    if (index < 0 || index >= reels.length) return;

    currentIndex = index;

    // Update UI
    document.querySelectorAll('.reel-slide').forEach((slide, idx) => {
      slide.classList.toggle('active', idx === index);
    });

    // Play/pause videos
    document.querySelectorAll('video').forEach((video, idx) => {
      if (idx === index) {
        video.play().catch(() => console.log('Play failed'));
      } else {
        video.pause();
      }
    });

    // Update progress
    document.getElementById('progressFill').style.width = `${((index + 1) / reels.length) * 100}%`;
  }

  function toggleLike(btn, reelId) {
    if (likedReels.has(reelId)) {
      likedReels.delete(reelId);
      btn.classList.remove('liked');
      btn.textContent = '🤍';
    } else {
      likedReels.add(reelId);
      btn.classList.add('liked');
      btn.textContent = '❤️';
      showDoubleTapIndicator(event);
    }
  }

  function showDoubleTapIndicator(e) {
    const indicator = document.createElement('div');
    indicator.className = 'double-tap-indicator';
    indicator.textContent = '❤️';
    indicator.style.position = 'fixed';
    indicator.style.left = (e?.clientX || window.innerWidth / 2) - 30 + 'px';
    indicator.style.top = (e?.clientY || window.innerHeight / 2) - 30 + 'px';
    document.body.appendChild(indicator);
    setTimeout(() => indicator.remove(), 400);
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // Touch/Swipe handling
  document.addEventListener('touchstart', (e) => {
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  document.addEventListener('touchend', (e) => {
    const touchEndY = e.changedTouches[0].clientY;
    const diff = touchStartY - touchEndY;

    // Swipe up = next reel (diff > 50px)
    if (diff > 50) {
      showReel(currentIndex + 1);
    }
    // Swipe down = previous reel (diff < -50px)
    else if (diff < -50) {
      showReel(currentIndex - 1);
    }
  }, { passive: true });

  // Double tap to like
  let lastTap = 0;
  document.addEventListener('touchend', (e) => {
    const now = Date.now();
    if (now - lastTap < 300 && e.target.tagName !== 'BUTTON') {
      // Double tap detected
      const video = document.querySelector('.reel-slide.active video');
      if (video) {
        const likeBtn = document.querySelector('.reel-slide.active .like-btn');
        if (likeBtn && !likeBtn.classList.contains('liked')) {
          likeBtn.click();
        }
        showDoubleTapIndicator(e);
      }
    }
    lastTap = now;
  }, { passive: true });

  // Keyboard navigation (for desktop testing)
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowUp') showReel(currentIndex - 1);
    if (e.key === 'ArrowDown') showReel(currentIndex + 1);
  });

  // Initialize
  loadReels();
</script>

</body>
</html>
